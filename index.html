<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yif</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            font-family: 'Arial Black', 'Helvetica Black', Impact, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        .yif-loop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 0;
            background: #000;
            z-index: 1;
        }

        .yif-item {
            color: #111;
            font-size: 4vw;
            font-weight: 900;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
            mix-blend-mode: screen;
            animation: subtlePulse 3s infinite alternate;
            letter-spacing: -2px;
        }

        .yif-item:nth-child(odd) {
            color: #0a1f1a;
        }
        .yif-item:nth-child(3n) {
            color: #1a2f2a;
        }
        .yif-item:nth-child(5n+2) {
            color: #0c2e22;
        }

        @keyframes subtlePulse {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        .image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }

        .center-image {
            max-width: min(500px, 70vw);
            max-height: min(500px, 70vh);
            width: auto;
            height: auto;
            object-fit: cover;
            image-rendering: crisp-edges;
            filter: contrast(1.1) brightness(1.1);
        }

        @media (max-width: 700px) {
            .yif-loop {
                grid-template-columns: repeat(4, 1fr);
            }
            .yif-item {
                font-size: 8vw;
            }
        }
    </style>
</head>
